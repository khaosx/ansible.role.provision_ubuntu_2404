---
- name: Updates | Deploy periodic upgrade configuration
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: true
  tags:
    - harden-system

- name: Updates | Deploy unattended-upgrades configuration
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    backup: true
  tags:
    - harden-system

- name: Fail2ban | Ensure service is enabled and running
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  tags:
    - harden-system

- name: SSH | Check for existing ED25519 host key
  ansible.builtin.stat:
    path: /etc/ssh/ssh_host_ed25519_key
  register: provision_ubuntu_2404_ssh_hostkey_ed25519
  tags:
    - harden-system

# ssh-keygen -A is required because host keys are generated by OpenSSH tooling, not a native Ansible module.
- name: SSH | Generate default host keys when missing
  ansible.builtin.command: ssh-keygen -A
  when: not provision_ubuntu_2404_ssh_hostkey_ed25519['stat']['exists']
  changed_when: true
  notify: Provision_ubuntu_2404 | Restart sshd
  tags:
    - harden-system

- name: SSH | Deploy hardening drop-in
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Provision_ubuntu_2404 | Restart sshd
  tags:
    - harden-system

- name: Sysctl | Deploy hardening drop-in
  ansible.builtin.template:
    src: sysctl-99-hardening.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Provision_ubuntu_2404 | Reload kernel params
  tags:
    - harden-system

- name: Fail2ban | Deploy jail configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Provision_ubuntu_2404 | Restart fail2ban
  tags:
    - harden-system
