---
- name: "Raspberry Pi radios | determine if changes requested"
  ansible.builtin.set_fact:
    provision_ubuntu_2404_rpi_radios_requested: "{{ (provision_ubuntu_2404_rpi_disable_wifi | bool) or (provision_ubuntu_2404_rpi_disable_bluetooth | bool) }}"
  changed_when: false

- name: "Raspberry Pi radios | check model (device tree)"
  ansible.builtin.stat:
    path: /sys/firmware/devicetree/base/model
  register: provision_ubuntu_2404_rpi_dt_model_stat
  when: provision_ubuntu_2404_rpi_radios_requested | bool

- name: "Raspberry Pi radios | read model (device tree)"
  ansible.builtin.slurp:
    path: /sys/firmware/devicetree/base/model
  register: provision_ubuntu_2404_rpi_dt_model
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_dt_model_stat.stat.exists

- name: "Raspberry Pi radios | check model (legacy device tree)"
  ansible.builtin.stat:
    path: /proc/device-tree/model
  register: provision_ubuntu_2404_rpi_dt_legacy_stat
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - not provision_ubuntu_2404_rpi_dt_model_stat.stat.exists

- name: "Raspberry Pi radios | read model (legacy device tree)"
  ansible.builtin.slurp:
    path: /proc/device-tree/model
  register: provision_ubuntu_2404_rpi_dt_legacy_model
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_dt_legacy_stat.stat.exists

- name: "Raspberry Pi radios | read cpuinfo (fallback)"
  ansible.builtin.slurp:
    path: /proc/cpuinfo
  register: provision_ubuntu_2404_rpi_cpuinfo
  when: provision_ubuntu_2404_rpi_radios_requested | bool

- name: "Raspberry Pi radios | set model facts"
  ansible.builtin.set_fact:
    provision_ubuntu_2404_rpi_model: >-
      {{
        (provision_ubuntu_2404_rpi_dt_model.content | b64decode | trim)
        if (provision_ubuntu_2404_rpi_dt_model is defined and provision_ubuntu_2404_rpi_dt_model.content is defined)
        else ((provision_ubuntu_2404_rpi_dt_legacy_model.content | b64decode | trim)
          if (provision_ubuntu_2404_rpi_dt_legacy_model is defined and provision_ubuntu_2404_rpi_dt_legacy_model.content is defined)
          else ((provision_ubuntu_2404_rpi_cpuinfo.content | b64decode).splitlines()
            | select('match', '^Model\\s*:')
            | list
            | first
            | default('')
            | regex_replace('^Model\\s*:\\s*', '')
          )
        )
      }}
    provision_ubuntu_2404_rpi_is_pi: "{{ 'Raspberry Pi' in (provision_ubuntu_2404_rpi_model | default('')) }}"
  changed_when: false
  when: provision_ubuntu_2404_rpi_radios_requested | bool

- name: "Raspberry Pi radios | determine generation"
  ansible.builtin.set_fact:
    provision_ubuntu_2404_rpi_generation: >-
      {{
        '5' if ('Raspberry Pi 5' in (provision_ubuntu_2404_rpi_model | default('')))
        else '4' if ('Raspberry Pi 4' in (provision_ubuntu_2404_rpi_model | default('')))
        else ''
      }}
  changed_when: false
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool

- name: "Raspberry Pi radios | fail on unknown generation"
  ansible.builtin.fail:
    msg: "Unable to determine Raspberry Pi generation from model '{{ provision_ubuntu_2404_rpi_model }}'."
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - provision_ubuntu_2404_rpi_generation == ""

- name: "Raspberry Pi radios | select overlays"
  ansible.builtin.set_fact:
    provision_ubuntu_2404_rpi_wifi_overlay: "{{ 'dtoverlay=disable-wifi' if provision_ubuntu_2404_rpi_generation == '4' else 'dtoverlay=disable-wifi-pi5' }}"
    provision_ubuntu_2404_rpi_bt_overlay: "{{ 'dtoverlay=disable-bt' if provision_ubuntu_2404_rpi_generation == '4' else 'dtoverlay=disable-bt-pi5' }}"
    provision_ubuntu_2404_rpi_overlay_lines: >-
      {{
        ([] +
          ([provision_ubuntu_2404_rpi_wifi_overlay] if provision_ubuntu_2404_rpi_disable_wifi | bool else []) +
          ([provision_ubuntu_2404_rpi_bt_overlay] if provision_ubuntu_2404_rpi_disable_bluetooth | bool else [])
        )
      }}
  changed_when: false
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - provision_ubuntu_2404_rpi_generation != ""

- name: "Raspberry Pi radios | check firmware config"
  ansible.builtin.stat:
    path: "{{ provision_ubuntu_2404_rpi_config_txt_path }}"
  register: provision_ubuntu_2404_rpi_config_stat
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool

- name: "Raspberry Pi radios | fail if config missing"
  ansible.builtin.fail:
    msg: "Raspberry Pi firmware config not found at {{ provision_ubuntu_2404_rpi_config_txt_path }}."
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - not provision_ubuntu_2404_rpi_config_stat.stat.exists

- name: "Raspberry Pi radios | backup firmware config"
  ansible.builtin.copy:
    src: "{{ provision_ubuntu_2404_rpi_config_txt_path }}"
    dest: "{{ provision_ubuntu_2404_rpi_config_txt_path }}.bak"
    remote_src: true
    force: false
    mode: "0644"
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - provision_ubuntu_2404_rpi_config_stat.stat.exists

- name: "Raspberry Pi radios | ensure overlays present"
  ansible.builtin.lineinfile:
    path: "{{ provision_ubuntu_2404_rpi_config_txt_path }}"
    line: "{{ item }}"
    regexp: "^#?{{ item | regex_escape() }}\\s*$"
    state: present
    insertafter: EOF
    create: false
    backup: true
  loop: "{{ provision_ubuntu_2404_rpi_overlay_lines }}"
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - provision_ubuntu_2404_rpi_config_stat.stat.exists
    - provision_ubuntu_2404_rpi_overlay_lines | length > 0

- name: "Raspberry Pi radios | optionally disable bluetooth.service"
  ansible.builtin.systemd:
    name: bluetooth.service
    enabled: false
    state: stopped
    masked: true
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - provision_ubuntu_2404_rpi_disable_bluetooth | bool
    - provision_ubuntu_2404_rpi_disable_bt_service | bool

- name: "Raspberry Pi radios | remove legacy blacklist"
  ansible.builtin.file:
    path: /etc/modprobe.d/raspi-blacklist.conf
    state: absent
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool

- name: "Raspberry Pi radios | debug detection"
  ansible.builtin.debug:
    msg:
      model: "{{ provision_ubuntu_2404_rpi_model | default('') }}"
      generation: "{{ provision_ubuntu_2404_rpi_generation | default('') }}"
      overlays: "{{ provision_ubuntu_2404_rpi_overlay_lines | default([]) }}"
      config_path: "{{ provision_ubuntu_2404_rpi_config_txt_path }}"
  when:
    - provision_ubuntu_2404_rpi_radios_requested | bool
    - provision_ubuntu_2404_rpi_is_pi | bool
    - provision_ubuntu_2404_rpi_debug | bool or (ansible_verbosity | int) >= 2
