  ansible.builtin.import_tasks: set_vars.yml

- name: Main | Apply system baseline
  ansible.builtin.import_tasks: system_baseline.yml

- name: Main | Manage Raspberry Pi radios
  ansible.builtin.import_tasks: raspberry_pi.yml

