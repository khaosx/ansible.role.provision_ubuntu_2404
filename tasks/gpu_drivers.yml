---
# lshw is used for best-effort hardware discovery where no native Ansible GPU fact exists.
- name: GPU Detection | Probe display adapters with lshw
  ansible.builtin.command:
    cmd: lshw -short -class display
  register: provision_ubuntu_2404_gpu_list
  changed_when: false
  failed_when: false
  tags:
    - provision_ubuntu_2404_update_system

# lspci is used for vendor detection because it is the canonical PCI inventory source.
- name: GPU Detection | Probe PCI devices with lspci
  ansible.builtin.command:
    cmd: lspci -nn
  register: provision_ubuntu_2404_nvidia_pci
  changed_when: false
  failed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Detection | Set NVIDIA GPU presence fact
  ansible.builtin.set_fact:
    provision_ubuntu_2404_has_nvidia_gpu: >-
      {{ (provision_ubuntu_2404_nvidia_pci['stdout'] | default('') | regex_search('NVIDIA|10de', ignorecase=True)) is not none }}
  changed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Detection | Set Intel GPU presence fact
  ansible.builtin.set_fact:
    provision_ubuntu_2404_has_intel_gpu: >-
      {{
        (provision_ubuntu_2404_nvidia_pci['stdout'] | default('') | regex_search('^(?=.*(VGA|3D))(.*Intel|.*8086)', multiline=True)) is not none
      }}
  changed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - drivers

- name: GPU Detection | Check for nvidia-smi binary
  ansible.builtin.stat:
    path: /usr/bin/nvidia-smi
  register: provision_ubuntu_2404_nvidia_smi_stat
  changed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

# lsmod is required to confirm currently loaded kernel modules.
- name: GPU Detection | Check loaded NVIDIA kernel modules
  ansible.builtin.command:
    cmd: lsmod
  register: provision_ubuntu_2404_nvidia_lsmod
  changed_when: false
  failed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

# dpkg output is used to detect installed NVIDIA driver package state.
- name: GPU Detection | Check installed NVIDIA driver packages
  ansible.builtin.command:
    cmd: dpkg -l
  register: provision_ubuntu_2404_nvidia_dpkg
  changed_when: false
  failed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Detection | Set NVIDIA driver presence fact
  ansible.builtin.set_fact:
    provision_ubuntu_2404_nvidia_drivers_present: >-
      {{
        provision_ubuntu_2404_nvidia_smi_stat['stat']['exists']
        or (provision_ubuntu_2404_nvidia_lsmod['stdout_lines'] | default([]) | select('match', '^nvidia') | list | length > 0)
        or ((provision_ubuntu_2404_nvidia_dpkg['stdout'] | default('')) | regex_search('^ii\\s+nvidia-driver-', multiline=True)) is not none
      }}
  changed_when: false
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Drivers | Ensure ubuntu-drivers-common package is present
  ansible.builtin.apt:
    name: ubuntu-drivers-common
    state: present
    update_cache: true
  when: provision_ubuntu_2404_has_nvidia_gpu | default(false) | bool
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

# ubuntu-drivers autoinstall is the supported installer for Ubuntu-managed NVIDIA drivers.
- name: GPU Drivers | Install NVIDIA drivers via ubuntu-drivers
  ansible.builtin.command:
    cmd: ubuntu-drivers autoinstall
  register: provision_ubuntu_2404_nvidia_driver_install
  changed_when: true
  when:
    - provision_ubuntu_2404_has_nvidia_gpu | default(false) | bool
    - not provision_ubuntu_2404_nvidia_drivers_present | default(false) | bool
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Drivers | Check reboot marker after NVIDIA install
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: provision_ubuntu_2404_nvidia_reboot_required
  changed_when: false
  when:
    - provision_ubuntu_2404_nvidia_driver_install is defined
    - provision_ubuntu_2404_nvidia_driver_install is changed
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Drivers | Reboot when required after NVIDIA install
  ansible.builtin.reboot:
    msg: Rebooting to load NVIDIA drivers
    reboot_timeout: "{{ provision_ubuntu_2404_reboot_timeout | default(600) }}"
    pre_reboot_delay: 0
    post_reboot_delay: 30
  when:
    - provision_ubuntu_2404_nvidia_reboot_required is defined
    - provision_ubuntu_2404_nvidia_reboot_required['stat'] is defined
    - provision_ubuntu_2404_nvidia_reboot_required['stat']['exists'] | default(false)
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

# nvidia-smi is the canonical runtime probe for successful NVIDIA driver activation.
- name: GPU Drivers | Verify nvidia-smi execution
  ansible.builtin.command:
    cmd: nvidia-smi
  register: provision_ubuntu_2404_nvidia_smi_check
  changed_when: false
  failed_when: false
  when:
    - provision_ubuntu_2404_has_nvidia_gpu | default(false) | bool
    - >-
      (provision_ubuntu_2404_nvidia_drivers_present | default(false) | bool)
      or
      (
        provision_ubuntu_2404_nvidia_driver_install is defined
        and
        provision_ubuntu_2404_nvidia_driver_install is changed
      )
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Drivers | Fail when NVIDIA drivers did not load
  ansible.builtin.fail:
    msg: NVIDIA drivers were installed but nvidia-smi failed. Check dmesg and /var/log/syslog.
  when:
    - provision_ubuntu_2404_has_nvidia_gpu | default(false) | bool
    - provision_ubuntu_2404_nvidia_smi_check is defined
    - (provision_ubuntu_2404_nvidia_smi_check | default({})).get('rc', 1) | int != 0
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Drivers | Refresh NVIDIA driver presence fact
  ansible.builtin.set_fact:
    provision_ubuntu_2404_nvidia_drivers_present: "{{ ((provision_ubuntu_2404_nvidia_smi_check | default({})).get('rc', 1) | int) == 0 }}"
  changed_when: false
  when:
    - (provision_ubuntu_2404_nvidia_smi_check | default({})).get('rc') is not none
  tags:
    - provision_ubuntu_2404_update_system
    - nvidia
    - drivers

- name: GPU Drivers | Install Intel GPU tools
  ansible.builtin.apt:
    name: intel-gpu-tools
    state: present
  when:
    - provision_ubuntu_2404_has_intel_gpu | default(false) | bool
  tags:
    - provision_ubuntu_2404_update_system
